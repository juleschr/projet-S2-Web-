<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jeu en JS</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- Barre du haut : bouton + score à gauche + temps à droite -->
    <div class="top_bar">
        <button class="start_btn">Start / Restart</button>

        <div class="infos_left">
            <div class="score">Score : 0</div>
        </div>

        <div class="infos_right">
            <div class="time">Temps : 50</div>
        </div>
    </div>

    <!-- Zone de jeu -->
    <div class="contrainer"></div>

    <script src="script.js"></script>
</body>
</html>
